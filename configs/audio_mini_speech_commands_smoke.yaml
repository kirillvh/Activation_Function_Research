experiment:
  name: null
  output_dir: runs/audio_smoke
  seed: 42
  deterministic: true

runtime:
  cpu_affinity: [0, 1, 2, 3, 4, 5, 6, 7]
  intraop_threads: 8
  interop_threads: 1

data:
  dataset: mini_speech_commands
  root: data
  download: true
  split_seed: 1234
  validation_percentage: 10
  test_percentage: 10
  sample_rate: 16000
  sample_length: 16000
  batch_size: 32
  num_workers: 0
  pin_memory: false
  max_train_samples: 256
  max_validation_samples: 128
  max_test_samples: 128
  augmentation:
    enabled: true
    time_shift_samples: 800
    gain_min: 0.9
    gain_max: 1.1
    noise_std: 0.002
    peak_normalize: true

model:
  architecture: raw_audio_cnn
  activation: gelu
  activation_kwargs: {}
  channels: [8, 16, 24, 32]
  kernel_sizes: [80, 9, 9, 9]
  strides: [4, 4, 4, 2]
  dropout: 0.1
  num_classes: 8

training:
  epochs: 2
  device: cpu
  learning_rate: 0.001
  activation_learning_rate_multiplier: 0.5
  activation_weight_decay: 0.0
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  scheduler_min_learning_rate: 0.0
  gradient_clip_norm: 5.0
  evaluate_best_validation: true
  log_every_steps: 20

checkpoint:
  enabled: true
  save_every_steps: 100
  keep_latest: 1
  resume: null

tensorboard:
  enabled: false
