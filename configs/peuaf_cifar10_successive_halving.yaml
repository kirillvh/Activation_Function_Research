name: peuaf_cifar10_successive_halving
base_config: configs/cifar10_resnet18_research.yaml
output_dir: runs/multistart

search:
  seed: 42
  population_size: 4
  generations: 1
  elite_count: 2
  initial_strategy: grid
  minimum_frequency: 0.05
  maximum_frequency: 0.95
  warmup_epochs: 10
  selection_metric: best_validation_accuracy
  candidate_tensorboard: false
  successive_halving:
    reduction_factor: 2
    rung_epochs: [30, 60]

final_training:
  # The selected path receives 10 + 20 + 30 + 240 = 300 total epochs.
  epochs: 240
