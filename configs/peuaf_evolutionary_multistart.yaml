name: peuaf_evolutionary_multistart
base_config: configs/cifar10_resnet18_research.yaml
output_dir: runs/multistart

search:
  seed: 42
  population_size: 6
  generations: 2
  elite_count: 2
  initial_strategy: grid
  minimum_frequency: 0.05
  maximum_frequency: 0.95
  mutation_std: 0.08
  warmup_epochs: 3
  selection_metric: best_validation_accuracy
  candidate_tensorboard: false

final_training:
  # This is a fresh schedule after loading the selected candidate's best weights.
  epochs: 300
